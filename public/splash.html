    :root {
      color-scheme: dark;
      --bg: #0a101c;
      --bg-2: #101a2c;
      --panel: rgba(10, 16, 28, 0.72);
      --panel-border: rgba(154, 167, 191, 0.18);
      --brand: #5aa2ff;
      --brand-soft: rgba(90, 162, 255, 0.18);
      --brand-strong: rgba(90, 162, 255, 0.42);
      --mint: #65d8c3;
      --amber: #ffd166;
      --text: #f6f8fc;
      --muted: #8b99ae;
      --soft: #c2cedd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "JetBrains Mono", monospace, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    body {
      display: grid;
      place-items: center;
      position: relative;
      background:
              linear-gradient(135deg, rgba(10,16,28,.56) 0%, rgba(16,26,44,.42) 100%),
              url('launcher-bg.svg') center center / cover no-repeat,
              linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
              linear-gradient(180deg, rgba(7,11,21,.28) 0%, rgba(7,11,21,.62) 100%),
              radial-gradient(circle at bottom left, rgba(101,216,195,.14), transparent 28%),
              radial-gradient(circle at bottom right, rgba(90,162,255,.16), transparent 30%);
      opacity: 1;
      pointer-events: none;
    }
    .shell {
      position: relative;
      z-index: 2;
      width: min(360px, calc(100vw - 48px));
      padding: 0;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,.96);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 10px 30px rgba(15,23,42,.24);
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -.04em;
    }
    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }
    .status {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--soft);
      font-size: 12px;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--brand);
      box-shadow: 0 0 0 0 rgba(90,162,255,.5);
      animation: ping 1.4s ease-out infinite;
    }
    .bar {
      margin-top: 18px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
    }
    .bar::after {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(90,162,255,.25) 0, rgba(90,162,255,.95) 100%);
      animation: load 1.35s ease-in-out infinite;
    }
    @keyframes ping {
      0% { box-shadow: 0 0 0 0 rgba(90,162,255,.45); }
      70% { box-shadow: 0 0 0 10px rgba(90,162,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(90,162,255,0); }
    }
    @keyframes load {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(260%); }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="brand">
    <div class="logo">
      <img src="brand-logo.png" alt="BromCom logo">
    </div>
    <div>
      <div class="name">Bromcom</div>
      <div class="sub">Test Plan Builder</div>
    </div>
  </div>
  <div class="status">
    <span class="dot"></span>
    <span>Preparing workspace</span>
  </div>
  <div class="bar"></div>
</div>
</body>
